# This workflow runs when you push code to the main branch
# It tests and builds your code to make sure everything works
name: CI/CD Pipeline

# WHEN does this run?
# Answer: When you push code to the "main" branch
on:
  push:
    branches:
      - main

# WHAT jobs will run?
jobs:
  test-and-build:
    # Use Ubuntu Linux machine to run the tests
    runs-on: ubuntu-latest

    steps:
      # STEP 1: Download your code from GitHub
      - name: Checkout code
        uses: actions/checkout@v4

      # STEP 2: Install Node.js (JavaScript runtime)
      # We need Node.js version 20 to run our code
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          # Cache npm packages to make future runs faster
          cache: "npm"
          cache-dependency-path: |
            server/package-lock.json
            client/package-lock.json

      # STEP 3: Install all packages needed for the server
      # npm ci = clean install (faster and more reliable than npm install)
      - name: Install server dependencies
        working-directory: ./server
        run: npm ci

      # STEP 4: Install all packages needed for the client
      - name: Install client dependencies
        working-directory: ./client
        run: npm ci

      # STEP 5: Run server tests
      # If tests fail, the workflow stops here
      - name: Run server tests
        working-directory: ./server
        run: npm test

      # STEP 6: Run client tests
      # If tests fail, the workflow stops here
      - name: Run client tests
        working-directory: ./client
        run: npm test

      # STEP 7: Validate server code
      # (You can add actual build command if needed)
      - name: Build server
        working-directory: ./server
        run: |
          echo "Server build validation passed"

      # STEP 8: Build the client (Next.js)
      # This creates production-ready files
      - name: Build client
        working-directory: ./client
        run: npm run build

  # JOB 2: Figure out what changed (server or client or both)
  detect-changes:
    runs-on: ubuntu-latest
    # These outputs will be used by other jobs
    outputs:
      server: ${{ steps.filter.outputs.server }}
      client: ${{ steps.filter.outputs.client }}

    steps:
      # Download your code
      - name: Checkout code
        uses: actions/checkout@v4

      # Check which files changed
      # This looks at your commit and sees if server/ or client/ files changed
      - name: Check for changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            server:
              - 'server/**'  # Did any file in server/ folder change?
            client:
              - 'client/**'  # Did any file in client/ folder change?

  # JOB 3: Deploy server (only if server files changed and tests passed)
  deploy-server:
    needs: [test-and-build, detect-changes] # Wait for CI and detect-changes
    if: needs.detect-changes.outputs.server == 'true' # Only run if server changed
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Send a signal to Render to deploy the server
      # Render will pull the latest code and restart your server
      - name: Deploy to Render
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -n "$RENDER_DEPLOY_HOOK_URL" ]; then
            curl -X POST "$RENDER_DEPLOY_HOOK_URL"  # Send HTTP request to Render
            echo "Server deployment triggered on Render"
          else
            echo "RENDER_DEPLOY_HOOK_URL not configured"
            exit 1
          fi

  # JOB 4: Deploy client (only if client files changed and tests passed)
  deploy-client:
    needs: [test-and-build, detect-changes] # Wait for CI and detect-changes
    if: needs.detect-changes.outputs.client == 'true' # Only run if client changed
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # Install Node.js
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      # Install client packages
      - name: Install dependencies
        working-directory: ./client
        run: npm ci

      # Build the client for production
      - name: Build client
        working-directory: ./client
        run: npm run build

      # Deploy the client (configure based on your hosting)
      - name: Deploy client
        env:
          CLIENT_DEPLOY_HOOK_URL: ${{ secrets.CLIENT_DEPLOY_HOOK_URL }}
        run: |
          if [ -n "$CLIENT_DEPLOY_HOOK_URL" ]; then
            curl -X POST "$CLIENT_DEPLOY_HOOK_URL"  # Send signal to deploy
            echo "Client deployment triggered"
          else
            echo "CLIENT_DEPLOY_HOOK_URL not configured"
            echo "Add your client deployment logic here (Vercel, Netlify, etc.)"
          fi

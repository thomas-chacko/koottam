# This workflow automatically merges development branch into main
# It only runs when triggered by the ci.yml workflow
name: Auto Merge to Main

# WHEN does this run?
# Answer: When it receives the "auto-merge-to-main" signal from ci.yml
on:
  repository_dispatch:
    types: [auto-merge-to-main]

jobs:
  merge:
    runs-on: ubuntu-latest
    
    steps:
      # STEP 1: Merge development into main using GitHub API
      - name: Merge development to main
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.PAT_TOKEN }}
          script: |
            try {
              const result = await github.rest.repos.merge({
                owner: context.repo.owner,
                repo: context.repo.repo,
                base: 'main',
                head: 'development',
                commit_message: 'Auto-merge development to main after successful CI'
              });
              console.log('Merge successful:', result.data);
            } catch (error) {
              console.error('Merge failed:', error.message);
              throw error;
            }

# This workflow automatically merges development branch into main
# It only runs when triggered by the ci.yml workflow
name: Auto Merge to Main

# WHEN does this run?
# Answer: When it receives the "auto-merge-to-main" signal from ci.yml
on:
  repository_dispatch:
    types: [auto-merge-to-main]

jobs:
  merge:
    runs-on: ubuntu-latest
    
    steps:
      # STEP 1: Checkout the repository with PAT token
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.PAT_TOKEN }}
          fetch-depth: 0
          ref: main

      # STEP 2: Configure Git
      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # STEP 3: Fetch and merge development
      - name: Merge development to main
        run: |
          git fetch origin development
          git merge origin/development --no-ff -m "Auto-merge development to main after successful CI"
          git push origin main
